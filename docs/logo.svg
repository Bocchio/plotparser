<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 232 48" fill="none" role="img" aria-label="PlotParser">
  <!-- icon: axes + plotted curve + digitized sample points -->
  <path d="M12 6 V36 H42" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M13 33 C 20 31, 23 13, 41 14" stroke="#3b82f6" stroke-width="3.2" stroke-linecap="round"/>
  <g stroke="#ffffff" stroke-width="1.4">
    <circle cx="13" cy="33" r="2.7" fill="#06b6d4"/>
    <circle cx="22.9" cy="22.4" r="2.7" fill="#06b6d4"/>
    <circle cx="30" cy="16.3" r="2.7" fill="#06b6d4"/>
    <circle cx="41" cy="14" r="2.7" fill="#06b6d4"/>
  </g>
  <!-- wordmark (brand blue, readable on light and dark themes) -->
  <text x="54" y="33" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-0.4" fill="#3b82f6" textLength="174" lengthAdjust="spacingAndGlyphs">PlotParser</text>
</svg>
